name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Package extension
        run: vsce package
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: jspp-vsix
          path: '*.vsix'
