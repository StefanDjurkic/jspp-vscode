name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Publish to Marketplace
        run: vsce publish -p ${{ secrets.VSCE_PAT }}
